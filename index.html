<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Context Manager Cloud Pro (Final Stable)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-line { position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background-color: #cbd5e1; }
        .timeline-dot { position: absolute; left: 8px; top: 8px; width: 16px; height: 16px; background-color: #0ea5e9; border: 3px solid #fff; border-radius: 50%; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .img-preview { max-height: 120px; object-fit: cover; border-radius: 8px; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #334155; transform: scale(1.1); box-shadow: 0 0 0 2px #fff; }
        .circle-progress { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .progress-indicator { transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .bulk-bar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900 pb-24">

                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

    <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[150] backdrop-blur-sm font-black"><div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl text-center font-black"><h3 class="text-lg font-bold text-slate-800 mb-2 font-black">削除確認</h3><div class="flex gap-2 mt-6 font-black"><button onclick="closeModal('delete')" class="flex-1 py-3 text-slate-500 font-bold">中止</button><button id="deleteExecuteBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold active:scale-95 transition">完全に削除</button></div></div></div>
    <div id="imageModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-4 z-[250] font-black font-black" onclick="closeModal('image')"><img id="imageModalContent" class="max-w-full max-h-full rounded-lg shadow-2xl font-black"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = { apiKey: "AIzaSyC6TKgRNRFhm023uAtTnXyJXHcQtO4i4nA", authDomain: "timer-d7f73.firebaseapp.com", projectId: "timer-d7f73", storageBucket: "timer-d7f73.firebasestorage.app", messagingSenderId: "779981072804", appId: "1:779981072804:web:62bcfad1b1bbe392993931" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        const provider = new GoogleAuthProvider(); const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'since-timer-cloud';

        let data = []; let user = null; window.selectedCategory = 'すべて'; let dashboardTab = 'day'; let searchQuery = '';
        let selectedIds = new Set(); let currentSelectedPhotosBase64 = []; let currentSelectedColor = 'default'; let currentEditingTimerId = null; let currentEditingLogId = null;
        let lifePlan = { birthDate: "1967-12-08", expectedAge: 90, goals: [] };

        onAuthStateChanged(auth, async (u) => {
            user = u; lifePlan = { birthDate: "1967-12-08", expectedAge: 90, goals: [] }; dashboardTab = 'day'; selectedIds.clear();
            if (u) { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('appRoot').classList.remove('hidden'); await loadProfileSettings(); setupRealtimeSync(); }
            else { document.getElementById('appRoot').classList.add('hidden'); document.getElementById('loginOverlay').classList.remove('hidden'); render(); }
        });

        window.signInWithGoogle = async () => { try { await setPersistence(auth, browserLocalPersistence); await signInWithPopup(auth, provider); } catch (err) { console.error(err); } };
        window.handleLogout = () => { if(confirm("ログアウトしますか？")) signOut(auth); };

        async function loadProfileSettings() { if (!user) return; const snap = await getDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'settings', 'config')); if (snap.exists()) { const r = snap.data(); lifePlan = { birthDate: r.birthDate || "1967-12-08", expectedAge: r.expectedAge || 90, goals: Array.isArray(r.goals) ? r.goals : [] }; } render(); }
        function setupRealtimeSync() { if (!user) return; onSnapshot(query(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'timers')), (snapshot) => { data = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() })); window.render(); }); }

        window.handleSearch = (val) => { searchQuery = val.toLowerCase(); window.render(); };
        window.changeDashboardTab = (id) => { dashboardTab = id; window.render(); };

        function calculateDetailedDiff(msDiff) {
            const totalDays = Math.floor(Math.abs(msDiff) / 86400000);
            const years = Math.floor(totalDays / 365);
            const remAfterYears = totalDays % 365;
            const months = Math.floor(remAfterYears / 30);
            const remAfterMonths = remAfterYears % 30;
            const weeks = Math.floor(remAfterMonths / 7);
            const days = remAfterMonths % 7;
            let breakdown = "";
            if (years > 0) breakdown += `${years}年`;
            if (months > 0 || years > 0) breakdown += `${months}ヶ月`;
            if (weeks > 0 || months > 0 || years > 0) breakdown += `${weeks}週`;
            breakdown += `${days}日`;
            return { breakdown, totalDays };
        }
